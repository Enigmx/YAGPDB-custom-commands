name: Modification
description: Suggest a code maintenance improvement, refactor, optimization, or future-proofing change.
labels: ["Modification"]

body:
  - type: dropdown
    id: target_cc
    attributes:
      label: Which Custom Command is affected?
      description: Select the Custom Command this modification applies to.
      options:
        - A snippet
        - Avatar
        - Custom Command Indent 
        - Custom Command Template
        - Embed Creator
        - Extract
        - Forum Automatic Help
        - Forum Post Logging
        - Forum Tools
        - Generate Infraction Reason
        - Pet
        - Public Gearbot Infractions
        - Redirect
        - Report
        - Restrict
        - Swift AutoModeration
        - Swift Mute
        - Todo
        - Translate
    validations:
      required: true

  - type: textarea
    id: modification_details
    attributes:
      label: Details
      description: Describe the improvement, refactor, optimization, or structural change you are proposing.
    validations:
      required: true
